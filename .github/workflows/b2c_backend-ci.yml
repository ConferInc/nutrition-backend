name: B2C Backend CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ConferInc/CI-Pipeline/.github/workflows/reusable-node-ci.yml@main
    with:
      node-version: "20"
      working-directory: .
      run-lint: false
      typecheck-command: npm run check
      run-tests: true
      test-command: npm test
    secrets: inherit

  docker-validate:
    needs: [ci]
    uses: ConferInc/CI-Pipeline/.github/workflows/reusable-docker-validate.yml@main
    with:
      context: .
      dockerfile: Dockerfile
      build-args: ""
    secrets: inherit