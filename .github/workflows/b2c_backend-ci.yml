name: B2C Backend CI

on:
  pull_request:
    branches: [main, develop, staging]
  push:
    branches: [main, develop, staging]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  pull-requests: read

jobs:
  ci:
    uses: ConferInc/CI-Pipeline/.github/workflows/reusable-node-ci.yml@main
    with:
      node-version: '20'
      working-directory: .
      run-lint: false
      typecheck-command: npm run check
      run-tests: true
      test-command: npm test
    secrets: inherit

  docker-validate:
    needs: [ci]
    uses: ConferInc/CI-Pipeline/.github/workflows/reusable-docker-validate.yml@main
    with:
      context: .
      dockerfile: Dockerfile
      build-args: ''
    secrets: inherit

  deploy-dev:
    needs: [docker-validate]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    uses: ConferInc/CI-Pipeline/.github/workflows/reusable-cd-deploy.yml@main
    with:
      image-name: nutrition-backend
      context: .
      dockerfile: Dockerfile
      build-args: ''
    secrets:
      COOLIFY_DEPLOY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_B2C_BACKEND_DEV }}
      COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}

  deploy-staging:
    needs: [docker-validate]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    uses: ConferInc/CI-Pipeline/.github/workflows/reusable-cd-deploy.yml@main
    with:
      image-name: nutrition-backend
      context: .
      dockerfile: Dockerfile
      build-args: ''
    secrets:
      COOLIFY_DEPLOY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_B2C_BACKEND_STAGING }}
      COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}

  deploy-prod:
    needs: [docker-validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ConferInc/CI-Pipeline/.github/workflows/reusable-cd-deploy.yml@main
    with:
      image-name: nutrition-backend
      context: .
      dockerfile: Dockerfile
      build-args: ''
    secrets:
      COOLIFY_DEPLOY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_B2C_BACKEND_PROD }}
      COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
